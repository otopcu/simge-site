site_name: SimGe Documentation
site_url: https://otopcu.github.io/simge-site/
site_description: SimGe (Simulation Generator) — HLA object model editor, federation modeling, and code generation.
site_author: Okan Topçu
copyright: Copyright &copy; 2011–2026 oToT

theme:
  name: material
  features:
    - navigation.instant
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - User Manual:
      - Overview: UserManual.md
      - Getting Started:
          - Introduction & Concepts: UserManual/Introduction.md
          - Installation & Updates: UserManual/Installation.md
          - Quick Start: UserManual/QuickStart.md
          - The SimGe Workspace: UserManual/Workspaces.md
          - Start Page: UserManual/StartPage.md
      - Projects:
          - Creating a Project: UserManual/CreatingProjects.md
          - Opening & Saving: UserManual/OpeningSaving.md
          - Project Structure & Settings: UserManual/ProjectSettings.md
          - Project Explorer: UserManual/ProjectExplorer.md
      - Object Modeling:
          - Modular FOM Concepts: UserManual/ModularFOM.md
          - Managing Modules: UserManual/ManagingModules.md
          - OME — Object Model Editor: UserManual/OME.md
          - Object Model Diagrams: UserManual/Diagrams.md
          - Importing & Exporting: UserManual/ImportExport.md
          - FOM Validation: UserManual/Validation.md
      - Object Model Analysis:
          - FOM Dashboard: UserManual/Dashboard.md
          - Model Metrics & Reports: UserManual/MetricsReports.md
          - Telemetry Visualizer: UserManual/TelemetryVisualizer.md
      - Federation Architecture (FAME): UserManual/FAME.md
      - Code Generation:
          - Code Generator: UserManual/CodeGenerator.md
          - Fora Telemetry & Validation: UserManual/ForaTelemetry.md
      - Preferences & Help:
          - Preferences & Options: UserManual/Preferences.md
          - Keyboard Shortcuts & Tips: UserManual/Shortcuts.md
          - Troubleshooting: UserManual/Troubleshooting.md
      - Glossary: UserManual/Glossary.md
  - Release Notes: ReleaseNotes.md
  - Disclaimer: Disclaimer.md

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite

plugins:
  - search

extra:
  analytics:
    provider: google
    # Set the GA_MEASUREMENT_ID repository variable (or env var) to a GA4 ID like "G-XXXXXXXXXX".
    # When unset, no tracking script is injected.
    property: !ENV [GA_MEASUREMENT_ID, '']
